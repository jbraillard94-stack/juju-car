name: Deploy to Infomaniak
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject Airtable token
        run: |
          sed -i "s|__AIRTABLE_TOKEN__|${{ secrets.AIRTABLE_TOKEN }}|g" airtable-sync.js

      - name: Clear FTP cache to force re-deploy of all files
        run: rm -f .ftp-deploy-sync-state.json

      - uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./
          server-dir: /sites/juju-car.ch/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
